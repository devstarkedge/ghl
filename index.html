<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://www.google.com/recaptcha/enterprise.js?render=6LfaOKksAAAAAOYICmKMSIYJBasYgBmxVWPqa0px"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161920;
      --border: rgba(255,255,255,0.08);
      --accent: #c8f04a;
      --accent-dark: #a8cc30;
      --text: #f0ede8;
      --muted: rgba(240,237,232,0.45);
      --input-bg: rgba(255,255,255,0.04);
      --input-focus: rgba(200,240,74,0.08);
      --radius: 12px;
      --transition: 0.2s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,240,74,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200,240,74,0.3);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea, select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 13px 16px;
      width: 100%;
      transition: border-color var(--transition), background var(--transition);
      outline: none;
      -webkit-appearance: none;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(240,237,232,0.2);
    }

    input:focus, textarea:focus {
      border-color: rgba(200,240,74,0.4);
      background: var(--input-focus);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background var(--transition), transform var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn .btn-text { transition: opacity 0.2s; }
    .btn .btn-loader { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; }
    .btn.loading .btn-text { opacity: 0; }
    .btn.loading .btn-loader { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(13,15,18,0.3);
      border-top-color: #0d0f12;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Success state */
    .success-box {
      display: none;
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.5s ease both;
    }

    .success-box.show { display: block; }

    .success-icon {
      width: 56px; height: 56px;
      background: rgba(200,240,74,0.12);
      border: 1px solid rgba(200,240,74,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg { width: 24px; height: 24px; }

    .success-box h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .success-box p { color: var(--muted); font-size: 15px; line-height: 1.6; }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: var(--radius);
      color: #ff8080;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 10px;
      text-align: center;
    }
    .error-msg.show { display: block; }

    /* Checkbox */
    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      line-height: 1.5;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      padding: 0;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <div class="badge">Get in touch</div>
      <h1>Let's <span>work</span> together</h1>
      <p class="subtitle">Fill in the form and we'll get back to you within 24 hours.</p>
    </div>

    <div class="card">

      <!-- Form -->
      <form id="contactForm" novalidate>
        <div class="row">
          <div class="field">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" placeholder="John" required />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" placeholder="Smith" required />
          </div>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>

        <div class="field">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
        </div>

        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" required />
            <span>I agree to the <a href="#" style="color:var(--accent);text-decoration:none;">Terms &amp; Conditions</a></span>
          </label>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span class="btn-text">Send message</span>
          <span class="btn-loader"><span class="spinner"></span></span>
        </button>

        <div class="error-msg" id="errorMsg">Something went wrong. Please try again.</div>
      </form>

      <!-- Success -->
      <div class="success-box" id="successBox">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#c8f04a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2>Message sent!</h2>
        <p>Thanks for reaching out. We'll be in touch with you shortly.</p>
      </div>

    </div>
  </div>

  <script>
    const FORM_ID     = 'YCGE0z52j6JUbz1jHDvS';
    const LOCATION_ID = 'DVI2D5jmAUwFZZHQEedb';

    // Generate a simple sessionId
    const sessionId = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
    );

    document.getElementById('contactForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const first_name         = document.getElementById('firstName').value.trim();
      const last_name          = document.getElementById('lastName').value.trim();
      const email              = document.getElementById('email').value.trim();
      const phone              = document.getElementById('phone').value.trim();
      const terms_and_conditions = document.getElementById('terms').checked;

      if (!first_name || !email) {
        showError('Please fill in your first name and email.');
        return;
      }

      if (!terms_and_conditions) {
        showError('Please agree to the Terms & Conditions.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.classList.remove('show');

      try {
        const captchaToken = await new Promise((resolve, reject) => {
          grecaptcha.enterprise.ready(() => {
            grecaptcha.enterprise.execute('6LfaOKksAAAAAOYICmKMSIYJBasYgBmxVWPqa0px', { action: 'LEADGEN_FORM_SUBMIT' })
              .then(resolve).catch(reject);
          });
        });

        const ghlPayload = {
          first_name,
          last_name,
          email,
          phone,
          terms_and_conditions: terms_and_conditions ? 'on' : '',
          formId: FORM_ID,
          location_id: LOCATION_ID,
          sessionId: sessionId,
          eventData: {
            source: "direct",
            referrer: document.referrer || "",
            page: {
              url: window.location.href,
              title: document.title
            },
            timestamp: Date.now(),
            domain: window.location.hostname,
            version: "v3"
          }
        };

        const formData = new FormData();
        formData.append('formData', JSON.stringify(ghlPayload));
        formData.append('formId', FORM_ID);
        formData.append('locationId', LOCATION_ID);
        formData.append('captchaV3', captchaToken);

        const res = await fetch('https://backend.leadconnectorhq.com/forms/submit', {
          method:  'POST',
          body:    formData,
        });

        if (res.ok) {
          document.getElementById('contactForm').style.display = 'none';
          document.getElementById('successBox').classList.add('show');
        } else {
          const data = await res.json().catch(() => ({}));
          console.error('Submission error:', data);
          showError(data.message || data.error || 'Submission failed. Please try again.');
        }
      } catch (err) {
        console.error('Submission catch:', err);
        showError('Network error. Please check your connection and try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
